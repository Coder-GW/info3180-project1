{% extends "base.html" %}

{% block main %}
<div class="row mt-5 justify-content-center">
  <div class="col-md-9">
    <div class="card shadow-sm">
      <div class="row g-0">

        <div class="col-md-5">
          <img src="{{ url_for('static', filename='uploads/' + property.photo) }}"
               class="img-fluid rounded-start h-100" style="object-fit: cover;" alt="{{ property.title }}">
        </div>

        <div class="col-md-7">
          <div class="card-body p-4">
            <h3 class="card-title fw-bold">{{ property.title }}</h3>

            <div class="mb-3">
              <span class="badge bg-primary fs-6">${{ property.price }}</span>
              <span class="badge bg-warning text-dark fs-6 ms-2">{{ property.prop_type }}</span>
            </div>

            <p class="card-text">{{ property.description }}</p>

            <p>🛏 {{ property.bedrooms }} Bedrooms &nbsp;&nbsp; 🚿 {{ property.bathrooms }} Bathrooms</p>
            <p>📍 {{ property.location }}</p>

            <a href="mailto:" class="btn" style="background-color: #1abc9c; color: white;">
              Email Realtor
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
